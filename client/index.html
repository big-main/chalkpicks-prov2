<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>ChalkPicks Pro — AI-Powered Sports Betting Picks & Analytics</title>
    <meta name="description" content="AI-powered sports betting picks with confidence scores, real-time odds, and +EV analysis for NFL, NBA, MLB & NHL." />
    <meta name="keywords" content="sports betting picks, AI betting analytics, +EV finder, NFL NBA picks, betting tools" />
    <meta name="author" content="ChalkPicks Pro" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://chalkpicks.live/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://chalkpicks.live/" />
    <meta property="og:title" content="ChalkPicks Pro — AI-Powered Sports Betting Picks & Analytics" />
    <meta property="og:description" content="The smartest sports betting platform ever built. AI picks with confidence scores, real-time stats, backtesting, and leaderboard. Join 12,000+ winning bettors." />
    <meta property="og:image" content="https://chalkpicks.live/og-image.png" />
    <meta property="og:site_name" content="ChalkPicks Pro" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://chalkpicks.live/" />
    <meta name="twitter:title" content="ChalkPicks Pro — AI Sports Betting Analytics" />
    <meta name="twitter:description" content="AI-powered picks with confidence scores, real-time stats, backtesting engine. 73%+ win rate verified." />
    <meta name="twitter:image" content="https://chalkpicks.live/og-image.png" />

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ChalkPicks Pro",
      "url": "https://chalkpicks.live",
      "description": "AI-powered sports betting picks and analytics platform",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://chalkpicks.live/picks?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ChalkPicks Pro",
      "applicationCategory": "SportsApplication",
      "operatingSystem": "Web",
      "description": "AI-powered sports betting picks analyzer with real-time stats, backtesting, and community leaderboard",
      "offers": {
        "@type": "Offer",
        "price": "9.99",
        "priceCurrency": "USD",
        "priceValidUntil": "2026-12-31"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "2847",
        "bestRating": "5"
      }
    }
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>" />

    <!-- Google Fonts: Orbitron (display) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#0a0b0f" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
</html>
